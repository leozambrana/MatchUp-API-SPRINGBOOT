version: '3.8'

services:
  matchup-db:
    image: postgres:16
    container_name: matchup-db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - matchup_data:/var/lib/postgresql/data

volumes:
  matchup_data: