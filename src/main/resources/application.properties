# Import environment variables from .env file
spring.config.import=optional:file:.env[.properties]

# Database Configuration
spring.datasource.url=jdbc:postgresql://${POSTGRES_DB_HOST}:${POSTGRES_PORT:5432}/postgres?sslmode=require&stringtype=unspecified
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.user=${POSTGRES_USER:postgres}
spring.flyway.password=${POSTGRES_PASSWORD}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT Configuration
jwt.secret=${SECRET:a-very-long-secret-key-that-needs-to-be-at-least-256-bits-for-HS256-algorithm-security}
jwt.expiration=86400000
